services:
  strategy-builder:
    build:
      context: .
      dockerfile: docker/strategy.Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ~/KIS/config:/root/KIS/config
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/auth/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backtester:
    build:
      context: .
      dockerfile: docker/backtester.Dockerfile
    ports:
      - "8002:8002"
    volumes:
      - ~/KIS/config:/root/KIS/config
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/api/auth/status')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  mcp-server:
    build:
      context: .
      dockerfile: docker/backtester.Dockerfile
    command: uv run python -m kis_mcp.server
    ports:
      - "3846:3846"
    volumes:
      - ~/KIS/config:/root/KIS/config
    environment:
      - MCP_HOST=0.0.0.0
      - MCP_PORT=3846
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3846/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: docker/app.Dockerfile
    ports:
      - "3333:3333"
    depends_on:
      strategy-builder:
        condition: service_healthy
      backtester:
        condition: service_healthy
      mcp-server:
        condition: service_healthy
    restart: unless-stopped
